<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes Dinámicos</title>
</head>
<body>
    <h1>Mensajes Dinámicos</h1>
    
    <h2>Tabla de Mensajes</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Mensaje</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <h2>Enviar Mensaje</h2>
    <form id="formulario">
        <label for="user">Usuario:</label>
        <input type="text" id="user" required>
        
        <label for="mensaje">Mensaje:</label>
        <input type="text" id="mensaje" required>
        
        <button type="submit">Enviar</button>
    </form>

    <script>
        const tbody = document.getElementById('tbody');

        // Paso 1: Cargar mensajes con fetch
        async function cargarMensajes() {
            const respuesta = await fetch('/api/mensajes');
            const mensajes = await respuesta.json();
            
            tbody.innerHTML = '';
            
            mensajes.forEach(msg => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${msg.id}</td>
                    <td>${msg.user}</td>
                    <td>${msg.content}</td>
                    <td>${msg.created_at || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Paso 2: Enviar mensaje con JavaScript y actualizar tabla sin recargar
        document.getElementById('formulario').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = document.getElementById('user').value;
            const mensaje = document.getElementById('mensaje').value;
            
            await fetch('/api/mensajes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, mensaje, access_password: 'xaphym' })
            });
            
            document.getElementById('formulario').reset();
            cargarMensajes();
        });

        // Paso 3: Cargar al iniciar
        cargarMensajes();
    </script>
</body>
</html>
